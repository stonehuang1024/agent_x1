# Agent X1 Configuration
# Main configuration file for the agent system

# LLM Provider Configuration
# Set which provider to use: kimi, anthropic, openai
provider: "anthropic"

# Provider-specific configurations
providers:
  kimi:
    api_key: ""  # Set via KIMI_API_KEY env var or provide here
    base_url: "https://api.moonshot.cn/v1"
    model: "moonshot-v1-32k"
    temperature: 0.7
    max_tokens: 16384
    
  anthropic:
    api_key: ""  # Set via ANTHROPIC_API_KEY env var or provide here
    base_url: "https://api.kimi.com/coding/"
    model: "kimi-k2.5"
    temperature: 0.7
    max_tokens: 16384
    
  openai:
    api_key: ""  # Set via OPENAI_API_KEY env var or provide here
    base_url: "https://api.openai.com/v1"
    model: "gpt-4"
    temperature: 0.7
    max_tokens: 16384

# Global engine settings (can be overridden by provider-specific settings above)
timeout: 3600
max_iterations: 200

# Tool Safety Configuration
# Global defaults for tool execution safety limits.
# Individual tools can override these with their own values.
tool_safety:
  default_timeout: 120          # Default tool execution timeout in seconds
  default_max_output: 50000     # Default max output chars (~12K tokens)
  subprocess_timeout: 55        # Subprocess timeout for CLI tools (grep, fd, etc.)

# System prompt
system_prompt: |
  You are a helpful AI assistant with access to tools.
  Use the available tools when needed to provide accurate information.
  Always respond in the same language as the user's query.
  
  Session file organization:
  - All files produced in each session should be saved to: results/session/{session_name}_{yyyy-mm-dd_H-M-S}/
  - This includes PDFs, data files, reports, and any other generated content

  Tool Safety:
  - All tools have timeout protection and output size limits.
  - If a tool returns "[OUTPUT TRUNCATED]", narrow your query or use pagination parameters.
  - If a tool returns a timeout error, try a simpler/smaller operation.

  Code Exploration Tools:
  - Use `grep_search` for regex/text search in files (prefer over run_command with grep).
  - Use `glob_search` to find files by name pattern (e.g. "*.py", "test_*").
  - Use `ls_directory` to quickly list directory contents before diving deeper.
  - Start broad (find files), then narrow down (search within specific files).

# Path Configuration
paths:
  log_dir: "logs"
  result_dir: "results"
  data_dir: "data"
  temp_dir: "tmp"
  session_dir: ""          # Session output directory (default: {result_dir}/session)
  memory_data_dir: ""      # Memory/history data directory (default: {result_dir}/memory_data)

# Logging
log_level: "DEBUG"
